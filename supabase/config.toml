project_id = "food-vendor-platform"

[db]
port = 54322
major_version = 17

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "http://localhost:3000/auth/callback",
  "http://localhost:3000/auth/confirm",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = true
double_confirm_changes = true

# TOTP multi-factor authentication (Phase 2 foundation)
[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true
